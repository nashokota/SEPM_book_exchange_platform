<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apply to Become Seller - Book Exchange Platform</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container form-container">
    <h1>Apply to Become Seller</h1>
    <p class="subtext">Submit your seller request. An admin must approve it before you can create book listings.</p>

    <div class="message message-error"
         th:if="${#fields.hasGlobalErrors()}"
         th:each="err : ${#fields.globalErrors()}"
         th:text="${err}">
    </div>

    <form th:action="@{/seller-applications/apply}" th:object="${sellerApplicationRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="reason">Why do you want to become a seller?</label>
            <textarea id="reason" th:field="*{reason}" rows="5"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
        </div>

        <div class="form-group">
            <label for="pickupLocation">Preferred pickup / handover location</label>
            <input id="pickupLocation" type="text" th:field="*{pickupLocation}">
            <div class="field-error" th:if="${#fields.hasErrors('pickupLocation')}" th:errors="*{pickupLocation}"></div>
        </div>

        <button class="btn" type="submit">Submit Seller Application</button>
    </form>

    <div class="inline-links">
        <a th:href="@{/seller-applications/mine}">My Seller Applications</a>
        <a th:href="@{/dashboard}">Back to Dashboard</a>
    </div>
</div>
</body>
</html>
