<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Access Denied | Book Exchange Platform')}"></head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('access')}"></div>

<main class="main-content">
    <div class="page-shell page-shell-narrow">
        <section class="panel">
            <span class="eyebrow">Permission required</span>
            <h1>Access denied</h1>
            <p class="page-copy">You are signed in, but this account does not have permission to open the page you requested.</p>
            <div class="actions" style="margin-top: 18px;">
                <a class="btn" th:href="@{/dashboard}">Back to Dashboard</a>
                <a class="btn btn-secondary" th:href="@{/}">Go Home</a>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{fragments/layout :: siteFooter()}"></div>
</body>
</html>
