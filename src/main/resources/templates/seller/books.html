<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Book Listings - Book Exchange Platform</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
    <h1>My Book Listings</h1>

    <div class="message message-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="message message-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="actions">
        <a class="btn" th:href="@{/seller/books/create}">Create New Listing</a>
        <a class="btn btn-secondary" th:href="@{/dashboard}">Back to Dashboard</a>
        <a class="btn btn-link" th:href="@{/}">Home</a>
    </div>

    <div th:if="${#lists.isEmpty(books)}" class="info-box">
        <p>You have not created any book listings yet.</p>
    </div>

    <table th:if="${!#lists.isEmpty(books)}" class="data-table">
        <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Mode</th>
            <th>Availability</th>
            <th>Price</th>
            <th>Updated</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}">Clean Code</td>
            <td th:text="${book.author}">Robert C. Martin</td>
            <td th:text="${book.category.name}">Programming</td>
            <td th:text="${book.listingMode}">SELL_ONLY</td>
            <td th:text="${book.availabilityStatus}">AVAILABLE</td>
            <td th:text="${book.price != null ? book.price : '-'}">500.00</td>
            <td th:text="${book.updatedAt}">2026-04-02T12:00</td>
            <td>
                <div class="table-actions">
                    <a class="btn btn-link btn-small"
                       th:href="@{/seller/books/{id}/edit(id=${book.id})}">
                        Edit
                    </a>

                    <form th:action="@{/seller/books/{id}/delete(id=${book.id})}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this book listing?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-danger btn-small" type="submit">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
