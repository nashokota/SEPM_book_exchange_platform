<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Book Form</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container form-container">
    <h1 th:text="${pageTitle}">Book Form</h1>

    <div class="message message-error"
         th:if="${#fields.hasGlobalErrors()}"
         th:each="err : ${#fields.globalErrors()}"
         th:text="${err}">
    </div>

    <form th:action="@{${formAction}}" th:object="${bookRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}">
            <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="form-group">
            <label for="author">Author</label>
            <input id="author" type="text" th:field="*{author}">
            <div class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
        </div>

        <div class="form-group">
            <label for="isbn">ISBN (optional)</label>
            <input id="isbn" type="text" th:field="*{isbn}">
            <div class="field-error" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
        </div>

        <div class="form-group">
            <label for="categoryId">Category</label>
            <select id="categoryId" th:field="*{categoryId}">
                <option value="">-- Select category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                    Programming
                </option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
        </div>

        <div class="form-group">
            <label for="condition">Condition</label>
            <select id="condition" th:field="*{condition}">
                <option value="">-- Select condition --</option>
                <option th:each="condition : ${bookConditions}"
                        th:value="${condition}"
                        th:text="${condition}">
                    GOOD
                </option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('condition')}" th:errors="*{condition}"></div>
        </div>

        <div class="form-group">
            <label for="listingMode">Listing mode</label>
            <select id="listingMode" th:field="*{listingMode}">
                <option value="">-- Select mode --</option>
                <option th:each="mode : ${listingModes}"
                        th:value="${mode}"
                        th:text="${mode}">
                    EXCHANGE_ONLY
                </option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('listingMode')}" th:errors="*{listingMode}"></div>
        </div>

        <div class="form-group">
            <label for="availabilityStatus">Availability</label>
            <select id="availabilityStatus" th:field="*{availabilityStatus}">
                <option value="">-- Select availability --</option>
                <option th:each="status : ${availabilityStatuses}"
                        th:value="${status}"
                        th:text="${status}">
                    AVAILABLE
                </option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('availabilityStatus')}" th:errors="*{availabilityStatus}"></div>
        </div>

        <div class="form-group">
            <label for="price">Price (required for SELL_ONLY or BOTH)</label>
            <input id="price" type="number" step="0.01" min="0.01" th:field="*{price}">
            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group">
            <label for="exchangePreference">Exchange preference (optional)</label>
            <textarea id="exchangePreference" th:field="*{exchangePreference}" rows="3"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('exchangePreference')}" th:errors="*{exchangePreference}"></div>
        </div>

        <div class="form-group">
            <label for="imageUrl">Image URL (optional)</label>
            <input id="imageUrl" type="text" th:field="*{imageUrl}">
            <div class="field-error" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></div>
        </div>

        <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea id="description" th:field="*{description}" rows="5"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="actions">
            <button class="btn" type="submit" th:text="${submitLabel}">Save</button>
            <a class="btn btn-secondary" th:href="@{/seller/books}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
