<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
   <title>Login - Book Exchange Platform</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container form-container">
   <h1>Login</h1>

   <div class="message message-success" th:if="${successMessage}" th:text="${successMessage}"></div>
   <div class="message message-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

   <form th:action="@{/login}" method="post">
       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

       <div class="form-group">
           <label for="username">Email</label>
           <input id="username" name="username" type="email" required>
       </div>

       <div class="form-group">
           <label for="password">Password</label>
           <input id="password" name="password" type="password" required>
       </div>

       <button class="btn" type="submit">Login</button>
   </form>

   <div class="inline-links">
       <a th:href="@{/register}">Create a new account</a>
       <a th:href="@{/}">Back to home</a>
   </div>
</div>
</body>
</html>
