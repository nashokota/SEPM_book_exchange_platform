<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
   <title>Register - Book Exchange Platform</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container form-container">
   <h1>Create Buyer Account</h1>
   <p class="subtext">Every new account starts as a buyer. Seller access will be requested later through an approval workflow.</p>

   <form th:action="@{/register}" th:object="${registerRequest}" method="post">
       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

       <div class="form-group">
           <label for="fullName">Full name</label>
           <input id="fullName" type="text" th:field="*{fullName}">
           <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
       </div>

       <div class="form-group">
           <label for="email">Email</label>
           <input id="email" type="email" th:field="*{email}">
           <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
       </div>

       <div class="form-group">
           <label for="password">Password</label>
           <input id="password" type="password" th:field="*{password}">
           <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
       </div>

       <div class="form-group">
           <label for="confirmPassword">Confirm password</label>
           <input id="confirmPassword" type="password" th:field="*{confirmPassword}">
           <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
       </div>

       <div class="form-group">
           <label for="phoneNumber">Phone number (optional)</label>
           <input id="phoneNumber" type="text" th:field="*{phoneNumber}">
           <div class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
       </div>

       <div class="form-group">
           <label for="address">Address (optional)</label>
           <textarea id="address" th:field="*{address}" rows="3"></textarea>
           <div class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
       </div>

       <button class="btn" type="submit">Register</button>
   </form>

   <div class="inline-links">
       <a th:href="@{/login}">Already have an account?</a>
       <a th:href="@{/}">Back to home</a>
   </div>
</div>
</body>
</html>
