<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
   <title>Manage Categories - Book Exchange Platform</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
   <h1>Manage Categories</h1>

   <div class="message message-success" th:if="${successMessage}" th:text="${successMessage}"></div>
   <div class="message message-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

   <div class="info-box">
       <h2>Create Category</h2>

       <form th:action="@{/admin/categories}" th:object="${categoryRequest}" method="post">
           <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

           <div class="form-group">
               <label for="name">Category name</label>
               <input id="name" type="text" th:field="*{name}">
               <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
           </div>

           <div class="form-group">
               <label for="description">Description (optional)</label>
               <textarea id="description" th:field="*{description}" rows="3"></textarea>
               <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
           </div>

           <button class="btn" type="submit">Create Category</button>
       </form>
   </div>

   <div class="info-box">
       <h2>Existing Categories</h2>

       <div th:if="${#lists.isEmpty(categories)}">
           <p>No categories have been created yet.</p>
       </div>

       <table th:if="${!#lists.isEmpty(categories)}" class="data-table">
           <thead>
           <tr>
               <th>Name</th>
               <th>Description</th>
               <th>Updated</th>
               <th>Actions</th>
           </tr>
           </thead>
           <tbody>
           <tr th:each="category : ${categories}">
               <td th:text="${category.name}">Fiction</td>
               <td th:text="${category.description}">Story books</td>
               <td th:text="${category.updatedAt}">2026-04-02T12:00</td>
               <td>
                   <div class="table-actions">
                       <a class="btn btn-link btn-small"
                          th:href="@{/admin/categories/{id}/edit(id=${category.id})}">
                           Edit
                       </a>

                       <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post"
                             onsubmit="return confirm('Are you sure you want to delete this category?');">
                           <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                           <button class="btn btn-danger btn-small" type="submit">Delete</button>
                       </form>
                   </div>
               </td>
           </tr>
           </tbody>
       </table>
   </div>

   <div class="actions">
       <a class="btn btn-secondary" th:href="@{/admin}">Back to Admin</a>
       <a class="btn btn-link" th:href="@{/dashboard}">Dashboard</a>
   </div>
</div>
</body>
</html>
