<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Seller Applications - Book Exchange Platform</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
    <h1>Manage Seller Applications</h1>

    <div class="message message-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="message message-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(applications)}" class="info-box">
        <p>No pending seller applications right now.</p>
    </div>

    <div th:each="_application : ${applications}" class="application-card">
        <h2>
            <span th:text="${_application.user.fullName}">Buyer Name</span>
            <span class="badge badge-pending" th:text="${_application.status}">PENDING</span>
        </h2>

        <p><strong>Email:</strong> <span th:text="${_application.user.email}">user@example.com</span></p>
        <p><strong>Pickup location:</strong> <span th:text="${_application.pickupLocation}">Khulna</span></p>
        <p><strong>Reason:</strong> <span th:text="${_application.reason}">I want to sell books.</span></p>
        <p><strong>Submitted at:</strong> <span th:text="${_application.createdAt}">2026-04-02T12:00</span></p>

        <form th:action="@{/admin/seller-applications/{id}/approve(id=${_application.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label th:for="'remarks-' + ${_application.id}">Admin remarks (optional)</label>
                <textarea th:id="'remarks-' + ${_application.id}" name="adminRemarks" rows="3"></textarea>
            </div>

            <div class="actions">
                <button class="btn" type="submit">Approve</button>
                <button class="btn btn-danger"
                        type="submit"
                        th:formaction="@{/admin/seller-applications/{id}/reject(id=${_application.id})}">
                    Reject
                </button>
            </div>
        </form>
    </div>

    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/admin}">Back to Admin</a>
        <a class="btn btn-link" th:href="@{/dashboard}">Dashboard</a>
    </div>
</div>
</body>
</html>
