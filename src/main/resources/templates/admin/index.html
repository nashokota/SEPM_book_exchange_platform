<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
   <title>Admin - Book Exchange Platform</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
   <h1>Admin Area</h1>
   <p>This is a protected placeholder page for admin-only access.</p>
   <p><strong>Logged in as:</strong> <span th:text="${currentUserEmail}">admin@bookexchange.local</span></p>

   <div class="actions">
       <a class="btn btn-secondary" th:href="@{/dashboard}">Back to Dashboard</a>
       <a class="btn btn-link" th:href="@{/}">Home</a>
   </div>

   <form class="logout-form" th:action="@{/logout}" method="post">
       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
       <button class="btn" type="submit">Logout</button>
   </form>
</div>
</body>
</html>
