<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
   <title>Admin - Book Exchange Platform</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
   <h1>Admin Area</h1>

   <p><strong>Logged in as:</strong> <span th:text="${currentUserEmail}">admin@bookexchange.local</span></p>

   <div class="info-box">
       <h2>Seller Approval Overview</h2>
       <p>
           Pending seller applications:
           <strong th:text="${pendingApplicationCount}">0</strong>
       </p>
   </div>

   <div class="actions">
       <a class="btn" th:href="@{/admin/seller-applications}">Manage Seller Applications</a>
       <a class="btn btn-link" th:href="@{/admin/categories}">Manage Categories</a>
       <a class="btn btn-secondary" th:href="@{/dashboard}">Back to Dashboard</a>
       <a class="btn btn-link" th:href="@{/}">Home</a>
   </div>

   <form class="logout-form" th:action="@{/logout}" method="post">
       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
       <button class="btn" type="submit">Logout</button>
   </form>
</div>
</body>
</html>
