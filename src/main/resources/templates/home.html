<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
   <title th:text="${appName}">Book Exchange Platform</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
   <h1 th:text="${appName}">Book Exchange Platform</h1>
   <p>This milestone adds buyer registration, login, logout, and basic role-based access control.</p>

   <div class="actions">
       <a class="btn" th:href="@{/register}">Create Buyer Account</a>
       <a class="btn btn-secondary" th:href="@{/login}">Login</a>
       <a class="btn btn-link" th:href="@{/dashboard}">Open Dashboard</a>
   </div>

   <div class="info-box">
       <h2>Local Admin Seed</h2>
       <p><strong>Email:</strong> admin@bookexchange.local</p>
       <p><strong>Password:</strong> Admin@12345</p>
   </div>
</div>
</body>
</html>
