name: build-and-test

on:
 pull_request:
   branches:
     - develop
     - main
 push:
   branches:
     - develop
     - main

permissions:
 contents: read

jobs:
 unit-tests:
   runs-on: ubuntu-latest

   steps:
     - name: Check out repository
       uses: actions/checkout@v5

     - name: Set up JDK 17
       uses: actions/setup-java@v4
       with:
         java-version: '17'
         distribution: 'temurin'
         cache: maven

     - name: Make Maven wrapper executable
       run: chmod +x mvnw

     - name: Run unit/service tests
       run: ./mvnw --batch-mode --update-snapshots test

 integration-and-repository-tests:
   runs-on: ubuntu-latest
   needs: unit-tests

   steps:
     - name: Check out repository
       uses: actions/checkout@v5

     - name: Set up JDK 17
       uses: actions/setup-java@v4
       with:
         java-version: '17'
         distribution: 'temurin'
         cache: maven

     - name: Make Maven wrapper executable
       run: chmod +x mvnw

     - name: Run repository and integration tests
       run: ./mvnw --batch-mode --update-snapshots -Dskip.unit.tests=true verify
 deploy-to-render:
   runs-on: ubuntu-latest
   needs: integration-and-repository-tests
   if: github.event_name == 'push' && github.ref == 'refs/heads/main'

   steps:
     - name: Trigger Render deploy
       env:
         deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
       run: |
         if [ -z "$deploy_url" ]; then
           echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping deploy."
           exit 0
         fi

         curl "$deploy_url"
